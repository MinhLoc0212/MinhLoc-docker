name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ] # Kích hoạt khi push vào nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Action lấy code từ GitHub (Checkout)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Action Đăng nhập Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Action Đóng gói & Đẩy Image (Build and Push)
      - name: Build and push Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          # Thay 'minhloc0212' bằng username của bạn và 'spring-boot-app' bằng tên repo mong muốn
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/minhloc-docker:latest
            ${{ secrets.DOCKER_USERNAME }}/minhloc-docker:v${{ github.run_number }}
            
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="minhloc0212/minhloc-docker"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=6&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"

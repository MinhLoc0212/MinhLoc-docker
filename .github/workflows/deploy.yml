name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ] # Kích hoạt khi push vào nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Action lấy code từ GitHub (Checkout)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Action Đăng nhập Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Action Đóng gói & Đẩy Image (Build and Push)
      - name: Build and push Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          # Thay 'minhloc0212' bằng username của bạn và 'spring-boot-app' bằng tên repo mong muốn
          tags: ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:latest
